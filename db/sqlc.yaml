version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries"
    schema: "./schema.sql"
    gen:
      go:
        package: "db"
        out: "./generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
